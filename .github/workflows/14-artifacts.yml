name: 14 - Working with artifacts
on:
  workflow_dispatch:
jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: reactapp
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Download cached dependencies
        uses: actions/cache@v3
        id: cache
        with:
          path: reactapp/node_modules
          key: deps-node-modules-${{ hashFiles('reactapp/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm install
      - name: Unit test
        run: npm run test
      - name: Build code
        run: npm run build
      - name: Upload build files
        uses: actions/upload-artifact@v3
        with:
          name: app
          path: reactapp/build
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v3
        with:
          name: app
          path: build