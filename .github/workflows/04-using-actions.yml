name: 04 - Using action
on:
  # - push
  - workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    # default:
      # run:
        # working-directory: reactapp/
    steps:
      # Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Printing Folders
        run: ls
      - name: Printing react Folders
        run: ls reactapp/
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      # Install dependencies
      - name: Install dependencies
        run: npm install
        working-directory: reactapp/
      # Execute automated tests
      - name: Run unit tests
        run: npm run test
        working-directory: reactapp/